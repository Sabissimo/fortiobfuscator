#config-version=FGT60F-7.2.5-FW-build1517-230619
config system global
    set admin-sport 8443
    set hostname "HQ-FortiGate"
end
config system interface
    edit "port1"
        set vdom "root"
        set ip 203.0.113.10 255.255.255.0
        set allowaccess ping https ssh
        set type physical
        set macaddr 00:0c:29:ab:cd:ef
    next
    edit "wan1"
        set ip 198.51.100.5 255.255.255.248
    next
    edit "LAN_Internal"
        set vdom "root"
        set ip 10.10.10.1 255.255.255.0
        set description "internal user lan"
    next
    edit "Guest_WiFi"
        set vdom "root"
        set ip 10.20.0.1 255.255.255.0
    next
end
config system zone
    edit "Trusted_Zone"
        set interface "LAN_Internal"
    next
end
config firewall address
    edit "all"
    next
    edit "Web_Server"
        set subnet 203.0.113.50 255.255.255.255
    next
    edit "Internal_Net"
        set subnet 10.10.10.0 255.255.255.0
    next
    edit "Vendor_FQDN"
        set type fqdn
        set fqdn "updates.vendor.com"
    next
    edit "Wildcard_Site"
        set type wildcard-fqdn
        set wildcard-fqdn "*.partner.example.org"
    next
end
config firewall addrgrp
    edit "Servers_Group"
        set member "Web_Server" "Internal_Net"
    next
end
config firewall ippool
    edit "NAT_Pool1"
        set startip 203.0.113.100
        set endip 203.0.113.110
    next
end
config firewall vip
    edit "Web_VIP"
        set extip 198.51.100.5
        set mappedip "203.0.113.50"
        set extintf "wan1"
    next
end
config firewall vipgrp
    edit "Web_VIP_Group"
        set member "Web_VIP"
    next
end
config firewall service custom
    edit "ALL"
    next
    edit "Custom_8080"
        set tcp-portrange 8080
    next
end
config firewall service group
    edit "Web_Services"
        set member "Custom_8080"
    next
end
config vpn ipsec phase1-interface
    edit "HQ_to_Branch"
        set interface "wan1"
        set psksecret ENC 4hG8sK2lWmZ9qP0xV7nR3tB6yU1cD5fA
        set remote-gw 198.51.100.200
    next
end
config vpn ipsec phase2-interface
    edit "HQ_to_Branch_P2"
        set phase1name "HQ_to_Branch"
    next
end
config firewall policy
    edit 1
        set name "Allow_LAN_to_WAN"
        set srcintf "LAN_Internal"
        set dstintf "wan1"
        set srcaddr "Internal_Net"
        set dstaddr "all"
        set action accept
        set service "Custom_8080"
        set comments "permit outbound web"
    next
    edit 2
        set name "Inbound_Web"
        set srcintf "wan1"
        set dstintf "LAN_Internal"
        set dstaddr "Web_VIP"
        set service "Web_Services"
    next
end
config wireless-controller vap
    edit "GuestNet"
        set ssid "CorpGuest-5G"
        set passphrase ENC zZ9xX8cC7vV6bB5nN4mM3
    next
end
config system admin
    edit "admin"
        set password ENC pLm0KoN9jIb8HuV7
    next
end
config vpn certificate local
    edit "Fortinet_SSL"
        set private-key "-----BEGIN ENCRYPTED PRIVATE KEY-----
MIIFHDBOBgkqhkiG9w0BBQ0wQTApBgkqhkiG9w0BBQwwHAQI
aBcDeFgHiJkLmNoPqRsTuVwXyZ1234567890abcdef==
-----END ENCRYPTED PRIVATE KEY-----"
    next
end
